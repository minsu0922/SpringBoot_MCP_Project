# === 운영 환경 설정 ===
# 실행: java -jar app.jar --spring.profiles.active=prod

# DB (환경변수 필수 - 기본값 없음)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 카카오맵 API (환경변수 필수)
kakao.map.api.key=${KAKAO_MAP_API_KEY}

# 파일 업로드 (소스 디렉토리 외부로 분리 — 재배포 시 파일 유실 방지)
file.upload.dir=${UPLOAD_DIR:/var/church/uploads/ministry}
file.upload.sermon.dir=${SERMON_UPLOAD_DIR:/var/church/uploads/sermon}

# JPA — 운영 환경에서는 자동 스키마 변경 차단 (validate: 엔티티와 DB 스키마 불일치 시 구동 실패)
spring.jpa.hibernate.ddl-auto=validate

# Thymeleaf 캐시 활성화
spring.thymeleaf.cache=true

# SQL 로그 비활성화
spring.jpa.show-sql=false

# Session
server.servlet.session.timeout=30m

# Logging
logging.level.root=WARN
logging.level.com.church.website=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
