<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--/* =============================================
     샘물교회 관리자 공통 레이아웃 Fragment
     사용법: th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'menuKey')}"
============================================= */-->

<th:block th:fragment="adminLayout(pageTitle, content, activeMenu)">
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${pageTitle}">관리자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:       #0D2B55;
            --navy-dark:  #0A1F3D;
            --navy-mid:   #185FA5;
            --navy-light: #2778C4;
            --sky:        #B5D4F4;
            --sky-pale:   #E6F1FB;
            --gold:       #C9A84C;
            --gold-bg:    rgba(201,168,76,0.12);
            --white:      #FAFBFD;
            --text-dark:  #0A1F3D;
            --text-mid:   #3A5278;
            --text-muted: #7A96B8;
            --bg-page:    #F4F7FC;
            --border:     #DDE4EF;
            --sidebar-w:  220px;
        }

        html, body {
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-page);
            color: var(--text-dark);
            font-size: 14px;
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; }

        /* ── Layout Shell ── */
        .admin-shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ══════════════════════════════
           SIDEBAR
        ══════════════════════════════ */
        .admin-sidebar {
            width: var(--sidebar-w);
            background: var(--navy);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Logo */
        .sb-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 20px 18px 18px;
            border-bottom: 1px solid rgba(181,212,244,0.1);
            flex-shrink: 0;
        }
        .sb-logo-cross {
            width: 20px;
            height: 20px;
            position: relative;
            flex-shrink: 0;
        }
        .sb-logo-cross::before,
        .sb-logo-cross::after {
            content: '';
            position: absolute;
            background: var(--gold);
            border-radius: 2px;
        }
        .sb-logo-cross::before { width: 4px; height: 20px; left: 8px; top: 0; }
        .sb-logo-cross::after  { width: 20px; height: 4px; left: 0; top: 6px; }
        .sb-logo-text { line-height: 1.2; }
        .sb-logo-name { color: var(--sky); font-size: 14px; font-weight: 600; }
        .sb-logo-sub  { color: var(--text-muted); font-size: 10px; margin-top: 1px; }

        /* Menu Groups */
        .sb-nav { padding: 10px 0; flex: 1; }
        .sb-group-label {
            padding: 14px 18px 4px;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .sb-group-label:first-child { padding-top: 8px; }

        .sb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            color: var(--sky);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
            position: relative;
        }
        .sb-item:hover {
            background: rgba(181,212,244,0.08);
            color: #fff;
        }
        .sb-item.active {
            background: rgba(181,212,244,0.12);
            border-left-color: var(--gold);
            color: #fff;
            font-weight: 500;
        }
        .sb-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .sb-item.active .sb-icon { opacity: 1; }
        .sb-badge {
            margin-left: auto;
            background: #dc3545;
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Divider */
        .sb-divider {
            height: 1px;
            background: rgba(181,212,244,0.1);
            margin: 8px 18px;
        }

        /* Footer */
        .sb-footer {
            padding: 14px 18px;
            border-top: 1px solid rgba(181,212,244,0.1);
            flex-shrink: 0;
        }
        .sb-user-name { color: var(--sky); font-size: 12px; font-weight: 500; }
        .sb-user-role { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
        .sb-logout-btn {
            display: inline-block;
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            border: 1px solid rgba(181,212,244,0.2);
            border-radius: 4px;
            padding: 4px 10px;
            transition: all 0.15s;
        }
        .sb-logout-btn:hover {
            color: var(--gold);
            border-color: rgba(201,168,76,0.4);
        }

        /* ══════════════════════════════
           MAIN AREA
        ══════════════════════════════ */
        .admin-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .admin-topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .topbar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .topbar-breadcrumb {
            font-size: 12px;
            color: var(--text-muted);
        }
        .topbar-breadcrumb span { color: var(--navy-mid); }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-site-link {
            font-size: 12px;
            color: var(--navy-mid);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 12px;
            transition: border-color 0.15s;
        }
        .topbar-site-link:hover { border-color: var(--navy-mid); }

        /* Content Area */
        .admin-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
        }

        /* ── SVG Icons (inline) ── */
        .icon-dashboard { /* grid */ }
        .icon-notice    { /* bell */ }
        .icon-ministry  { /* image */ }
        .icon-photo     { /* camera */ }
        .icon-family    { /* users */ }
        .icon-account   { /* user */ }
        .icon-settings  { /* gear */ }
    </style>
</head>
<body>
<div class="admin-shell">

    <!-- ══ SIDEBAR ══ -->
    <aside class="admin-sidebar">

        <!-- Logo -->
        <div class="sb-logo">
            <div class="sb-logo-cross"></div>
            <div class="sb-logo-text">
                <div class="sb-logo-name">샘물교회</div>
                <div class="sb-logo-sub">관리자 시스템</div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="sb-nav">

            <!-- 콘텐츠 그룹 -->
            <div class="sb-group-label">콘텐츠</div>

            <a th:href="@{/admin}" class="sb-item" th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="1" width="6" height="6" rx="1"/>
                    <rect x="9" y="1" width="6" height="6" rx="1"/>
                    <rect x="1" y="9" width="6" height="6" rx="1"/>
                    <rect x="9" y="9" width="6" height="6" rx="1"/>
                </svg>
                대시보드
            </a>

            <a th:href="@{/admin/notices}" class="sb-item" th:classappend="${activeMenu == 'notice'} ? 'active'">
                <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M13 10.5V3a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v8l2.5-1.5H13z"/>
                    <line x1="4" y1="5" x2="11" y2="5"/>
                    <line x1="4" y1="7.5" x2="9" y2="7.5"/>
                </svg>
                공지사항
            </a>

            <a th:href="@{/admin/ministry}" class="sb-item" th:classappend="${activeMenu == 'ministry'} ? 'active'">
                <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="3" width="14" height="10" rx="1"/>
                    <circle cx="5.5" cy="6.5" r="1.5"/>
                    <path d="M1 11l3.5-3 2.5 2.5 2-2 4 4"/>
                </svg>
                사역소개 관리
            </a>

            <div class="sb-divider"></div>

            <!-- 교인 그룹 -->
            <div class="sb-group-label">교인</div>

            <a th:href="@{/admin/new-family}" class="sb-item" th:classappend="${activeMenu == 'family'} ? 'active'">
                <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="6" cy="4" r="2.5"/>
                    <path d="M1 14c0-3 2-5 5-5s5 2 5 5"/>
                    <circle cx="12" cy="5" r="2"/>
                    <path d="M15 14c0-2.5-1.5-4-3-4"/>
                </svg>
                새가족 관리
                <span class="sb-badge" th:if="${uncheckedCount != null and uncheckedCount > 0}" th:text="${uncheckedCount}"></span>
            </a>

            <div class="sb-divider"></div>

            <!-- 시스템 그룹 -->
            <div class="sb-group-label">시스템</div>

            <a th:href="@{/admin/account}" class="sb-item" th:classappend="${activeMenu == 'account'} ? 'active'">
                <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="5" r="3"/>
                    <path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/>
                </svg>
                계정 관리
            </a>

            <a th:href="@{/admin/settings}" class="sb-item" th:classappend="${activeMenu == 'settings'} ? 'active'">
                <svg class="sb-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="8" r="2.5"/>
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/>
                </svg>
                설정
            </a>

        </nav>

        <!-- Footer -->
        <div class="sb-footer">
            <div class="sb-user-name" sec:authentication="name">관리자</div>
            <div class="sb-user-role">ADMIN</div>
            <form th:action="@{/logout}" method="post" style="margin-top: 10px;">
                <button type="submit" class="sb-logout-btn">로그아웃</button>
            </form>
        </div>

    </aside>

    <!-- ══ MAIN ══ -->
    <div class="admin-main">

        <!-- Top Bar -->
        <div class="admin-topbar">
            <div>
                <div class="topbar-title" th:replace="${pageTitle}">관리자</div>
                <div class="topbar-breadcrumb">샘물교회 &rsaquo; <span th:replace="${pageTitle}">페이지</span></div>
            </div>
            <div class="topbar-right">
                <a href="/" class="topbar-site-link" target="_blank">← 사이트 보기</a>
            </div>
        </div>

        <!-- Page Content -->
        <div class="admin-content">
            <th:block th:replace="${content}"/>
        </div>

    </div><!-- /admin-main -->

</div><!-- /admin-shell -->
</body>
</html>
</th:block>

</html>
