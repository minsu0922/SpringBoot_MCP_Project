<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사역사진 등록/수정 - 관리자</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', Arial, sans-serif; background: #f4f6f9; color: #333; }

        .admin-wrap { max-width: 700px; margin: 0 auto; padding: 30px 20px; }

        .admin-header {
            background: #fff;
            padding: 20px 24px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { font-size: 18px; font-weight: 600; color: #0D2B55; }

        .form-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 28px 28px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #0D2B55;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dce3ea;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fff;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #185FA5;
            box-shadow: 0 0 0 3px rgba(24,95,165,0.08);
        }
        .form-group textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
        .form-hint { font-size: 11px; color: #888; margin-top: 5px; }

        /* 미리보기 */
        .preview-wrap {
            margin-top: 10px;
            border: 1px dashed #dce3ea;
            border-radius: 4px;
            overflow: hidden;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
        }
        .preview-wrap img {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            display: block;
        }
        .preview-placeholder {
            color: #bbb;
            font-size: 13px;
            text-align: center;
            padding: 30px;
        }

        /* 토글 */
        .toggle-row { display: flex; align-items: center; gap: 10px; }
        .toggle-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .toggle-row label { font-size: 13px; cursor: pointer; color: #333; }

        /* 버튼 */
        .form-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn { display: inline-block; padding: 10px 24px; border-radius: 4px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; text-decoration: none; transition: background 0.2s; }
        .btn-primary { background: #0D2B55; color: #fff; }
        .btn-primary:hover { background: #185FA5; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #545b62; }
    </style>
</head>
<body>
<div class="admin-wrap">

    <div class="admin-header">
        <h1 th:text="${photo.id != null} ? '사역사진 수정' : '사역사진 등록'">사역사진 등록</h1>
        <a href="/admin/ministry" class="btn btn-secondary">← 목록으로</a>
    </div>

    <div class="form-card">
        <form th:action="@{/admin/ministry/save}" method="post">
            <input type="hidden" th:field="*{id}" th:object="${photo}">

            <!-- 카테고리 -->
            <div class="form-group">
                <label for="category">사역 카테고리 <span style="color:#dc3545;">*</span></label>
                <select id="category" name="category" required th:object="${photo}">
                    <option value="">카테고리 선택</option>
                    <option value="WORSHIP"   th:selected="${photo.category == 'WORSHIP'}">찬양 사역 (WORSHIP)</option>
                    <option value="CHILDREN"  th:selected="${photo.category == 'CHILDREN'}">어린이 사역 (CHILDREN)</option>
                    <option value="YOUTH"     th:selected="${photo.category == 'YOUTH'}">청년부 (YOUTH)</option>
                    <option value="MISSION"   th:selected="${photo.category == 'MISSION'}">선교 사역 (MISSION)</option>
                    <option value="COMMUNITY" th:selected="${photo.category == 'COMMUNITY'}">소그룹 (COMMUNITY)</option>
                    <option value="ETC"       th:selected="${photo.category == 'ETC'}">기타 (ETC)</option>
                </select>
            </div>

            <!-- 제목 -->
            <div class="form-group">
                <label for="title">사역 제목 <span style="color:#dc3545;">*</span></label>
                <input type="text" id="title" name="title"
                       th:value="${photo.title}"
                       placeholder="예) 2024 찬양의 밤"
                       required maxlength="100">
            </div>

            <!-- 설명 -->
            <div class="form-group">
                <label for="description">사역 설명</label>
                <textarea id="description" name="description"
                          placeholder="사역에 대한 간단한 설명을 입력하세요. (선택사항)"
                          maxlength="500"
                          th:text="${photo.description}"></textarea>
            </div>

            <!-- 사진 URL -->
            <div class="form-group">
                <label for="photoUrl">사진 URL <span style="color:#dc3545;">*</span></label>
                <input type="url" id="photoUrl" name="photoUrl"
                       th:value="${photo.photoUrl}"
                       placeholder="https://example.com/photo.jpg"
                       required maxlength="500"
                       oninput="updatePreview(this.value)">
                <p class="form-hint">이미지 URL을 직접 입력하세요. (jpg, png, webp 등)</p>
                <!-- 미리보기 -->
                <div class="preview-wrap" id="previewWrap">
                    <img id="previewImg"
                         th:src="${photo.photoUrl}"
                         th:style="${photo.photoUrl != null and !photo.photoUrl.isEmpty()} ? '' : 'display:none'"
                         alt="미리보기">
                    <div class="preview-placeholder"
                         id="previewPlaceholder"
                         th:style="${photo.photoUrl != null and !photo.photoUrl.isEmpty()} ? 'display:none' : ''">
                        📷 URL 입력 시 미리보기가 표시됩니다
                    </div>
                </div>
            </div>

            <!-- 표시 순서 -->
            <div class="form-group">
                <label for="displayOrder">표시 순서</label>
                <input type="number" id="displayOrder" name="displayOrder"
                       th:value="${photo.displayOrder != null ? photo.displayOrder : 0}"
                       min="0" max="999" value="0">
                <p class="form-hint">숫자가 작을수록 앞에 표시됩니다.</p>
            </div>

            <!-- 활성화 여부 -->
            <div class="form-group">
                <label>공개 여부</label>
                <div class="toggle-row">
                    <input type="checkbox" id="isActive" name="isActive" value="true"
                           th:checked="${photo.isActive == null or photo.isActive}">
                    <label for="isActive">사역소개 페이지에 표시</label>
                </div>
            </div>

            <!-- 버튼 -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">저장하기</button>
                <a href="/admin/ministry" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>

</div>

<script>
    function updatePreview(url) {
        const img = document.getElementById('previewImg');
        const placeholder = document.getElementById('previewPlaceholder');
        if (url && url.trim()) {
            img.src = url;
            img.style.display = 'block';
            placeholder.style.display = 'none';
            img.onerror = function() {
                img.style.display = 'none';
                placeholder.style.display = '';
                placeholder.textContent = '❌ 이미지를 불러올 수 없습니다.';
            };
        } else {
            img.style.display = 'none';
            placeholder.style.display = '';
            placeholder.textContent = '📷 URL 입력 시 미리보기가 표시됩니다';
        }
    }
</script>
</body>
</html>
