<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'ministry')}">

<title th:fragment="title" th:text="${photo.id != null} ? '사역사진 수정' : '사역사진 등록'">사역사진 등록</title>

<main th:fragment="main">
<style>
    .form-card {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
        max-width: 760px;
    }
    .form-card-header {
        padding: 16px 22px;
        border-bottom: 1px solid #EEF2F8;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .form-card-title { font-size: 14px; font-weight: 600; color: #0A1F3D; }
    .form-card-body  { padding: 24px 22px; }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    .form-group { margin-bottom: 22px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
    }
    .form-control {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        font-size: 14px;
        color: #0A1F3D;
        font-family: 'Noto Sans KR', sans-serif;
        background: #FAFBFD;
        transition: border-color 0.15s;
        box-sizing: border-box;
    }
    .form-control:focus {
        outline: none;
        border-color: #185FA5;
        background: #fff;
    }
    textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.7; }
    .form-hint { font-size: 11px; color: #7A96B8; margin-top: 5px; }

    /* 업로드 존 */
    .upload-zone {
        border: 2px dashed #DDE4EF;
        border-radius: 8px;
        padding: 32px 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: #F8FAFD;
    }
    .upload-zone:hover,
    .upload-zone.dragover {
        border-color: #185FA5;
        background: #EEF5FB;
    }
    .upload-zone-text {
        font-size: 13px;
        color: #3A5278;
        margin-top: 10px;
        font-weight: 500;
    }
    .upload-zone-hint {
        font-size: 11px;
        color: #7A96B8;
        margin-top: 4px;
    }

    /* 미리보기 */
    .preview-wrap {
        margin-top: 12px;
        position: relative;
        display: inline-block;
        max-width: 100%;
    }
    .preview-wrap img {
        max-width: 100%;
        max-height: 280px;
        object-fit: contain;
        border-radius: 8px;
        border: 1px solid #DDE4EF;
        display: block;
    }
    .preview-remove {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: none;
        background: #dc3545;
        color: #fff;
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
    }

    /* 표시 순서 스테퍼 */
    .order-stepper {
        display: flex;
        align-items: stretch;
        width: 160px;
        height: 44px;
        border: 1px solid #DDE4EF;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
    }
    .stepper-btn {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        background: #F4F7FC;
        border: none;
        font-size: 22px;
        font-weight: 400;
        line-height: 44px;
        color: #3A5278;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        text-align: center;
        user-select: none;
        padding: 0;
    }
    .stepper-btn:hover  { background: #DDE4EF; color: #0A1F3D; }
    .stepper-btn:active { background: #C8D6E8; }
    .stepper-input {
        flex: 1;
        width: 0;           /* flex가 너비를 결정하도록 */
        height: 44px;
        border: none;
        border-left: 1px solid #DDE4EF;
        border-right: 1px solid #DDE4EF;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
        color: #0A1F3D;
        background: #fff;
        outline: none;
        padding: 0;
        box-sizing: border-box;
        -moz-appearance: textfield;
        font-family: 'Noto Sans KR', sans-serif;
    }
    .stepper-input::-webkit-outer-spin-button,
    .stepper-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* 토글 */
    .toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        background: #FAFBFD;
    }
    .toggle-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #185FA5; }
    .toggle-label { font-size: 13px; color: #3A5278; cursor: pointer; }

    /* 버튼 */
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 22px;
        border-top: 1px solid #EEF2F8;
        background: #F8FAFD;
    }
    .btn-cancel {
        padding: 9px 18px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        background: #fff;
        color: #3A5278;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: #7A96B8; }
    .btn-save {
        padding: 9px 22px;
        border: none;
        border-radius: 6px;
        background: #0D2B55;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 0.15s;
    }
    .btn-save:hover { background: #185FA5; }
</style>

<div class="form-card">
    <div class="form-card-header">
        <div class="form-card-title" th:text="${photo.id != null} ? '사역사진 수정' : '사역사진 등록'">사역사진 등록</div>
        <a href="/admin/ministry" style="font-size:12px; color:#7A96B8;">← 목록으로</a>
    </div>

    <form th:action="@{/admin/ministry/save}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" th:object="${photo}">

        <div class="form-card-body">

            <!-- 카테고리 + 표시순서 한 줄 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="category">카테고리 <span style="color:#dc3545;">*</span></label>
                    <select id="category" name="category" class="form-control" required th:object="${photo}">
                        <option value="">카테고리 선택</option>
                        <option value="WORSHIP"   th:selected="${photo.category == 'WORSHIP'}">찬양 사역 (WORSHIP)</option>
                        <option value="CHILDREN"  th:selected="${photo.category == 'CHILDREN'}">어린이 사역 (CHILDREN)</option>
                        <option value="YOUTH"     th:selected="${photo.category == 'YOUTH'}">청년부 (YOUTH)</option>
                        <option value="MISSION"   th:selected="${photo.category == 'MISSION'}">선교 사역 (MISSION)</option>
                        <option value="COMMUNITY" th:selected="${photo.category == 'COMMUNITY'}">소그룹 (COMMUNITY)</option>
                        <option value="ETC"       th:selected="${photo.category == 'ETC'}">기타 (ETC)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">표시 순서</label>
                    <div class="order-stepper">
                        <button type="button" class="stepper-btn" onclick="adjustOrder(-1)">−</button>
                        <input type="number" id="displayOrder" name="displayOrder" class="stepper-input"
                               th:value="${photo.displayOrder != null ? photo.displayOrder : 0}"
                               min="0" max="999">
                        <button type="button" class="stepper-btn" onclick="adjustOrder(1)">+</button>
                    </div>
                    <div class="form-hint" style="margin-top:7px;">숫자가 작을수록 앞에 표시됩니다.</div>
                </div>
            </div>

            <!-- 제목 -->
            <div class="form-group">
                <label class="form-label" for="title">사역 제목 <span style="color:#dc3545;">*</span></label>
                <input type="text" id="title" name="title" class="form-control"
                       th:value="${photo.title}"
                       placeholder="예) 2024 찬양의 밤"
                       required maxlength="100">
            </div>

            <!-- 설명 -->
            <div class="form-group">
                <label class="form-label" for="description">사역 설명</label>
                <textarea id="description" name="description" class="form-control"
                          placeholder="사역에 대한 간단한 설명을 입력하세요. (선택사항)"
                          maxlength="500"
                          th:text="${photo.description}"></textarea>
            </div>

            <!-- 사진 파일 업로드 -->
            <div class="form-group">
                <label class="form-label" for="photoFile">
                    사진 파일
                    <span th:if="${photo.id == null}" style="color:#dc3545;">*</span>
                    <span th:if="${photo.id != null}" style="color:#7A96B8; font-weight:400;">(변경 시에만 선택)</span>
                </label>

                <!-- 드래그&드롭 업로드 영역 -->
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('photoFile').click()">
                    <div class="upload-zone-inner" id="uploadZoneInner">
                        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#B5D4F4" stroke-width="1.5">
                            <rect x="3" y="8" width="30" height="22" rx="2"/>
                            <circle cx="12" cy="16" r="3"/>
                            <path d="M3 25l8-8 6 6 5-5 10 10"/>
                        </svg>
                        <p class="upload-zone-text">클릭하거나 파일을 드래그하여 업로드</p>
                        <p class="upload-zone-hint">JPG, PNG, WEBP 지원 · 최대 10MB</p>
                    </div>
                </div>
                <input type="file" id="photoFile" name="photoFile"
                       accept="image/jpeg,image/png,image/webp,image/gif"
                       style="display:none;"
                       onchange="handleFileSelect(this)">

                <!-- 미리보기 -->
                <div class="preview-wrap" id="previewWrap"
                     th:style="${photo.photoUrl != null and !photo.photoUrl.isEmpty()} ? '' : 'display:none'">
                    <img id="previewImg"
                         th:src="${photo.photoUrl}"
                         alt="미리보기">
                    <button type="button" class="preview-remove" onclick="clearFile()" title="사진 제거">×</button>
                </div>
            </div>

            <!-- 공개 여부 -->
            <div class="form-group">
                <label class="form-label">공개 여부</label>
                <div class="toggle-row">
                    <input type="checkbox" id="isActive" name="isActive" value="true"
                           th:checked="${photo.isActive == null or photo.isActive}">
                    <label class="toggle-label" for="isActive">사역소개 페이지에 표시</label>
                </div>
            </div>

        </div>

        <div class="form-actions">
            <a href="/admin/ministry" class="btn-cancel">취소</a>
            <button type="submit" class="btn-save">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 7l3.5 3.5L11 3"/>
                </svg>
                저장
            </button>
        </div>
    </form>
</div>

<script>
    function adjustOrder(delta) {
        const input = document.getElementById('displayOrder');
        const val = parseInt(input.value) || 0;
        input.value = Math.max(0, Math.min(999, val + delta));
    }

    const uploadZone = document.getElementById('uploadZone');

    // 드래그&드롭
    uploadZone.addEventListener('dragover', e => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) applyFile(file);
    });

    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            applyFile(input.files[0]);
        }
    }

    function applyFile(file) {
        // 유효성 체크
        const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
        if (!allowed.includes(file.type)) {
            alert('JPG, PNG, WEBP, GIF 형식만 업로드할 수 있습니다.');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            alert('파일 크기는 10MB 이하여야 합니다.');
            return;
        }
        // DataTransfer로 input에 파일 세팅 (드래그드롭 경우)
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('photoFile').files = dt.files;

        // 미리보기
        const reader = new FileReader();
        reader.onload = e => {
            const wrap = document.getElementById('previewWrap');
            const img  = document.getElementById('previewImg');
            img.src = e.target.result;
            wrap.style.display = '';
            document.getElementById('uploadZone').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    function clearFile() {
        document.getElementById('photoFile').value = '';
        document.getElementById('previewWrap').style.display = 'none';
        document.getElementById('uploadZone').style.display = '';
        document.getElementById('previewImg').src = '';
    }
</script>
</main>

</th:block>
</html>
