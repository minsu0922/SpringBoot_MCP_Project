<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'notice')}">

<title th:fragment="title">공지사항 관리</title>

<main th:fragment="main">
<style>
    .page-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #0D2B55;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
    }
    .btn-primary:hover { background: #185FA5; }

    .btn-sm {
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        font-weight: 500;
        transition: opacity 0.15s;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-edit   { background: #E6F1FB; color: #185FA5; }
    .btn-delete { background: #FCEBEB; color: #A32D2D; }

    .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
    .alert-error   { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }

    .data-table {
        width: 100%;
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
    }
    .data-table table { width: 100%; border-collapse: collapse; }
    .data-table th {
        background: #F8FAFD;
        font-size: 12px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid #DDE4EF;
    }
    .data-table td {
        padding: 13px 16px;
        font-size: 13px;
        color: #3A5278;
        border-bottom: 1px solid #F4F7FC;
        vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #FAFBFD; }
    .num-cell   { color: #7A96B8; font-size: 12px; }
    .title-cell { color: #0A1F3D; font-weight: 500; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .action-cell { display: flex; gap: 6px; }
    .empty-row td { text-align: center; color: #7A96B8; padding: 40px !important; }

    /* 팝업 배지 */
    .popup-badge-on {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 10px;
        white-space: nowrap;
    }
    .popup-badge-on.active   { background: #EAF3DE; color: #3B6D11; }
    .popup-badge-on.inactive { background: #FAEEDA; color: #854F0B; }
    .popup-badge-on.expired  { background: #F1EFE8; color: #5F5E5A; }

    /* 팝업 기간 표시 */
    .popup-period-text {
        font-size: 11px;
        color: #7A96B8;
        margin-top: 3px;
        line-height: 1.4;
    }
</style>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

<div class="page-toolbar">
    <div style="font-size:13px; color:#7A96B8;">
        전체 <strong style="color:#0A1F3D;" th:text="${#lists.size(notices)}">0</strong>건
    </div>
    <a href="/admin/notices/new" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
        새 공지사항 작성
    </a>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th style="width:50px;">번호</th>
                <th>제목</th>
                <th style="width:90px;">작성자</th>
                <th style="width:65px;">조회수</th>
                <th style="width:130px;">작성일</th>
                <th style="width:150px;">팝업 상태</th>
                <th style="width:120px;">관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(notices)}" class="empty-row">
                <td colspan="7">등록된 공지사항이 없습니다.</td>
            </tr>
            <tr th:each="notice, stat : ${notices}">
                <td class="num-cell" th:text="${stat.count}"></td>
                <td class="title-cell" th:text="${notice.title}"></td>
                <td th:text="${notice.author}"></td>
                <td th:text="${notice.viewCount}"></td>
                <td style="font-size:12px;" th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd HH:mm')}"></td>

                <!-- 팝업 상태 컬럼 -->
                <td>
                    <!-- 팝업 OFF -->
                    <span th:if="${!notice.popup}" style="font-size:11px; color:#B5D4F4;">—</span>

                    <!-- 팝업 ON -->
                    <th:block th:if="${notice.popup}">
                        <!--/* 현재 활성 (기간 내) */-->
                        <span th:if="${notice.popupStartDate != null and notice.popupEndDate != null
                                       and #temporals.createNow().isAfter(notice.popupStartDate)
                                       and #temporals.createNow().isBefore(notice.popupEndDate)}"
                              class="popup-badge-on active">
                            ● 노출중
                        </span>

                        <!--/* 기간 미도래 */-->
                        <span th:if="${notice.popupStartDate != null
                                       and #temporals.createNow().isBefore(notice.popupStartDate)}"
                              class="popup-badge-on inactive">
                            ◎ 예정
                        </span>

                        <!--/* 기간 만료 */-->
                        <span th:if="${notice.popupEndDate != null
                                       and #temporals.createNow().isAfter(notice.popupEndDate)}"
                              class="popup-badge-on expired">
                            ✕ 만료
                        </span>

                        <!--/* 기간 미설정 */-->
                        <span th:if="${notice.popupStartDate == null or notice.popupEndDate == null}"
                              class="popup-badge-on inactive">
                            ⚠ 기간없음
                        </span>

                        <!-- 기간 텍스트 -->
                        <div class="popup-period-text"
                             th:if="${notice.popupStartDate != null and notice.popupEndDate != null}">
                            <span th:text="${#temporals.format(notice.popupStartDate, 'MM.dd HH:mm')}"></span>
                            ~
                            <span th:text="${#temporals.format(notice.popupEndDate, 'MM.dd HH:mm')}"></span>
                        </div>
                    </th:block>
                </td>

                <td>
                    <div class="action-cell">
                        <a th:href="@{/admin/notices/edit/{id}(id=${notice.id})}" class="btn-sm btn-edit">수정</a>
                        <form th:action="@{/admin/notices/delete/{id}(id=${notice.id})}" method="post"
                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <button type="submit" class="btn-sm btn-delete">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</main>

</th:block>
</html>
