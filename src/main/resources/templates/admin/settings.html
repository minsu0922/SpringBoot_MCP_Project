<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'settings')}">

<title th:fragment="title">설정</title>

<main th:fragment="main">
<style>
    .settings-card {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
        max-width: 820px;
    }
    .settings-card + .settings-card { margin-top: 24px; }

    .card-header {
        padding: 16px 22px;
        border-bottom: 1px solid #EEF2F8;
        font-size: 14px;
        font-weight: 600;
        color: #0A1F3D;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .card-body { padding: 24px 22px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) {
        .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }

    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
    }
    .form-control {
        width: 100%;
        padding: 9px 13px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        font-size: 13px;
        color: #0A1F3D;
        background: #FAFBFD;
        box-sizing: border-box;
        font-family: 'Noto Sans KR', sans-serif;
        transition: border-color 0.15s;
    }
    .form-control:focus { outline: none; border-color: #185FA5; background: #fff; }
    textarea.form-control { resize: vertical; min-height: 80px; line-height: 1.7; }
    .form-hint { font-size: 11px; color: #7A96B8; margin-top: 4px; }

    .section-divider {
        font-size: 11px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 24px 0 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid #EEF2F8;
    }
    .section-divider:first-child { margin-top: 0; }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 22px;
        border-top: 1px solid #EEF2F8;
        background: #F8FAFD;
    }
    .btn-save {
        padding: 9px 22px;
        border: none;
        border-radius: 6px;
        background: #0D2B55;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 0.15s;
    }
    .btn-save:hover { background: #185FA5; }

    .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; max-width: 820px; }
    .alert-success { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
    .alert-danger  { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }

    /* 교통 안내 미리보기 */
    .preview-panel {
        display: none;
        margin-top: 24px;
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
        max-width: 820px;
    }
    .preview-panel.visible { display: block; }
    .preview-panel-header {
        padding: 12px 22px;
        border-bottom: 1px solid #EEF2F8;
        font-size: 13px;
        font-weight: 600;
        color: #0A1F3D;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #F8FAFD;
    }
    .preview-panel-body { padding: 20px 22px; }
    .preview-row { display: grid; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 14px; font-size: 13px; }
    .preview-row:last-child { margin-bottom: 0; }
    .preview-label { color: #7A96B8; font-size: 11px; font-weight: 600; padding-top: 2px; }
    .preview-value { color: #3A5278; line-height: 1.7; white-space: pre-wrap; }
    .preview-value.empty { color: #BCC9DC; font-style: italic; }
    .btn-preview-toggle {
        display: inline-flex; align-items: center; gap: 6px;
        margin-top: 8px; font-size: 12px; color: #185FA5; cursor: pointer;
        background: #E6F1FB; padding: 5px 12px; border-radius: 4px;
        border: none; transition: background 0.15s;
    }
    .btn-preview-toggle:hover { background: #C8DFF7; }
    .btn-coord-search {
        padding: 9px 16px;
        border: 1px solid #185FA5;
        border-radius: 6px;
        background: #185FA5;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        transition: background 0.15s;
    }
    .btn-coord-search:hover { background: #0D2B55; border-color: #0D2B55; }

    .coord-result-item {
        padding: 8px 10px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.12s;
        border-bottom: 1px solid #DCE9F8;
    }
    .coord-result-item:last-child { border-bottom: none; }
    .coord-result-item:hover { background: #D6EAFF; }
</style>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

<div class="settings-card">
    <div class="card-header">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#185FA5" stroke-width="1.5">
            <circle cx="7.5" cy="7.5" r="2"/>
            <path d="M7.5 1v2M7.5 12v2M1 7.5h2M12 7.5h2M3.1 3.1l1.4 1.4M10.5 10.5l1.4 1.4M3.1 11.9l1.4-1.4M10.5 4.5l1.4-1.4"/>
        </svg>
        교회 기본 정보
    </div>

    <form th:action="@{/admin/settings/save}" method="post" th:object="${location}">
        <div class="card-body">

            <!-- 기본 정보 -->
            <div class="section-divider">기본 정보</div>
            <div class="form-group">
                <label class="form-label" for="churchName">교회 이름 <span style="color:#dc3545;">*</span></label>
                <input type="text" id="churchName" name="churchName" class="form-control"
                       th:value="${location.churchName}" required maxlength="100"
                       placeholder="예) 샘물교회">
            </div>
            <div class="form-group">
                <label class="form-label" for="address">주소 <span style="color:#dc3545;">*</span></label>
                <input type="text" id="address" name="address" class="form-control"
                       th:value="${location.address}" required maxlength="200"
                       placeholder="예) 서울특별시 강남구 테헤란로 123">
            </div>

            <!-- 연락처 -->
            <div class="section-divider">연락처</div>
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label" for="phone">전화번호</label>
                    <input type="text" id="phone" name="phone" class="form-control"
                           th:value="${location.phone}"
                           placeholder="02-1234-5678" maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label" for="fax">팩스</label>
                    <input type="text" id="fax" name="fax" class="form-control"
                           th:value="${location.fax}"
                           placeholder="02-1234-5679" maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">이메일</label>
                    <input type="email" id="email" name="email" class="form-control"
                           th:value="${location.email}"
                           placeholder="info@church.kr" maxlength="100">
                </div>
            </div>

            <!-- 지도 좌표 -->
            <div class="section-divider">지도 좌표 (카카오맵)</div>

            <!-- 주소 검색 -->
            <div class="form-group">
                <label class="form-label">주소로 좌표 검색</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="addrSearch" class="form-control"
                           th:placeholder="${location.address} ?: '예) 서울특별시 강동구 양재대로 1371'"
                           style="flex:1;"
                           onkeydown="if(event.key==='Enter'){event.preventDefault();searchCoord();}">
                    <button type="button" onclick="searchCoord()" class="btn-coord-search">
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8">
                            <circle cx="5.5" cy="5.5" r="4"/>
                            <line x1="8.8" y1="8.8" x2="12" y2="12"/>
                        </svg>
                        검색
                    </button>
                </div>
                <div id="searchResult" style="display:none; margin-top:10px; padding:12px 14px;
                     background:#F0F7FF; border:1px solid #B5D4F4; border-radius:6px; font-size:13px; color:#0A1F3D;">
                </div>
            </div>

            <!-- 지도 미리보기 -->
            <div id="coordMapPreview" style="display:none; height:220px; border-radius:6px;
                 border:1px solid #DDE4EF; overflow:hidden; margin-bottom:16px;"></div>

            <!-- 숨겨진 실제 저장 필드 -->
            <div class="form-row" style="display:none;">
                <input type="number" id="latitude"  name="latitude"
                       th:value="${location.latitude}"  step="0.000001">
                <input type="number" id="longitude" name="longitude"
                       th:value="${location.longitude}" step="0.000001">
            </div>
            <!-- 현재 저장된 좌표 표시 -->
            <div id="currentCoord" style="font-size:12px; color:#7A96B8; margin-bottom:8px;">
                <span th:if="${location.latitude != null}">
                    현재 저장된 좌표: <strong th:text="${location.latitude}"></strong>, <strong th:text="${location.longitude}"></strong>
                </span>
                <span th:if="${location.latitude == null}">좌표 미설정</span>
            </div>

            <!-- 교통 안내 -->
            <div class="section-divider">교통 안내</div>
            <div class="form-group">
                <label class="form-label" for="subwayInfo">지하철</label>
                <textarea id="subwayInfo" name="subwayInfo" class="form-control"
                          th:text="${location.subwayInfo}"
                          placeholder="예) 2호선 강남역 3번 출구에서 도보 5분"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="busInfo">버스</label>
                <textarea id="busInfo" name="busInfo" class="form-control"
                          th:text="${location.busInfo}"
                          placeholder="예) 간선 146, 360번 / 지선 3412번 정류장 하차"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="carInfo">자동차</label>
                    <textarea id="carInfo" name="carInfo" class="form-control"
                              th:text="${location.carInfo}"
                              placeholder="내비게이션: 교회 이름 또는 주소 검색"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="parkingInfo">주차 안내</label>
                    <textarea id="parkingInfo" name="parkingInfo" class="form-control"
                              th:text="${location.parkingInfo}"
                              placeholder="예) 지하 2층 주차장 이용 가능 (2시간 무료)"></textarea>
                </div>
            </div>

        </div>

        <div class="form-actions">
            <button type="button" class="btn-preview-toggle" onclick="togglePreview()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M1 6s2-4 5-4 5 4 5 4-2 4-5 4-5-4-5-4z"/>
                    <circle cx="6" cy="6" r="1.5"/>
                </svg>
                교통 안내 미리보기
            </button>
            <button type="submit" class="btn-save">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 7l3.5 3.5L11 3"/>
                </svg>
                저장
            </button>
        </div>
    </form>
</div>

<!-- 교통 안내 미리보기 패널 -->
<div class="preview-panel" id="previewPanel">
    <div class="preview-panel-header">
        <span>교통 안내 미리보기</span>
        <button type="button" onclick="togglePreview()"
                style="background:none; border:none; cursor:pointer; color:#7A96B8; font-size:18px; line-height:1;">×</button>
    </div>
    <div class="preview-panel-body">
        <div class="preview-row">
            <span class="preview-label">교회명</span>
            <span class="preview-value" id="prev-churchName">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">주소</span>
            <span class="preview-value" id="prev-address">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">전화</span>
            <span class="preview-value" id="prev-phone">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">이메일</span>
            <span class="preview-value" id="prev-email">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">지하철</span>
            <span class="preview-value" id="prev-subway">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">버스</span>
            <span class="preview-value" id="prev-bus">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">자동차</span>
            <span class="preview-value" id="prev-car">—</span>
        </div>
        <div class="preview-row">
            <span class="preview-label">주차</span>
            <span class="preview-value" id="prev-parking">—</span>
        </div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=11fd803d5d2ec36670b9fc590cb22442&libraries=services"></script>
<script>
    var coordMap = null;
    var coordMarker = null;

    /* 주소 검색 → 좌표 변환 */
    function searchCoord() {
        var query = document.getElementById('addrSearch').value.trim();
        if (!query) { alert('검색할 주소를 입력해주세요.'); return; }

        var resultBox = document.getElementById('searchResult');
        resultBox.style.display = 'block';
        resultBox.innerHTML = '<span style="color:#7A96B8;">검색 중...</span>';

        var geocoder = new kakao.maps.services.Geocoder();
        geocoder.addressSearch(query, function(results, status) {
            if (status !== kakao.maps.services.Status.OK || results.length === 0) {
                resultBox.innerHTML = '<span style="color:#A32D2D;">검색 결과가 없습니다. 주소를 더 자세히 입력해보세요.</span>';
                return;
            }

            if (results.length === 1) {
                /* 결과 1건이면 바로 선택 */
                selectCoord(results[0]);
                resultBox.innerHTML =
                    '<span style="color:#3B6D11;">✓ <strong>' + results[0].address_name + '</strong> 선택됨</span>';
            } else {
                /* 복수 결과 → 목록 표시 */
                var html = '<div style="font-size:12px;color:#7A96B8;margin-bottom:8px;">검색 결과 ' + results.length + '건 — 항목을 클릭해 선택하세요</div>';
                results.forEach(function(r, i) {
                    html += '<div class="coord-result-item" onclick="selectCoordFromResult(' + i + ')">'
                          + '<strong>' + r.address_name + '</strong>';
                    if (r.road_address) {
                        html += '<br><span style="font-size:11px;color:#7A96B8;">' + r.road_address.address_name + '</span>';
                    }
                    html += '</div>';
                });
                resultBox.innerHTML = html;
                window._searchResults = results;
            }
        });
    }

    function selectCoordFromResult(index) {
        var r = window._searchResults[index];
        selectCoord(r);
        var resultBox = document.getElementById('searchResult');
        resultBox.innerHTML = '<span style="color:#3B6D11;">✓ <strong>' + r.address_name + '</strong> 선택됨</span>';
    }

    function selectCoord(result) {
        var lat = parseFloat(result.y);
        var lng = parseFloat(result.x);

        /* 숨겨진 필드에 값 저장 */
        document.getElementById('latitude').value  = lat;
        document.getElementById('longitude').value = lng;

        /* 현재 좌표 표시 업데이트 */
        document.getElementById('currentCoord').innerHTML =
            '선택된 좌표: <strong>' + lat.toFixed(6) + '</strong>, <strong>' + lng.toFixed(6) + '</strong>';

        /* 지도 미리보기 렌더링 */
        showMapPreview(lat, lng);
    }

    function showMapPreview(lat, lng) {
        var mapEl = document.getElementById('coordMapPreview');
        mapEl.style.display = 'block';

        var coords = new kakao.maps.LatLng(lat, lng);

        if (!coordMap) {
            coordMap = new kakao.maps.Map(mapEl, { center: coords, level: 3 });
            coordMarker = new kakao.maps.Marker({ position: coords, map: coordMap });
        } else {
            coordMap.setCenter(coords);
            coordMarker.setPosition(coords);
        }
    }

    /* 기존 저장 좌표가 있으면 페이지 로드 시 미리보기 표시 */
    document.addEventListener('DOMContentLoaded', function() {
        var lat = parseFloat(document.getElementById('latitude').value);
        var lng = parseFloat(document.getElementById('longitude').value);
        if (lat && lng) {
            showMapPreview(lat, lng);
        }
    });

    /* 교통 안내 미리보기 */
    function togglePreview() {
        var panel = document.getElementById('previewPanel');
        var isVisible = panel.classList.toggle('visible');
        if (isVisible) syncPreview();
    }

    function val(id) {
        var el = document.getElementById(id);
        return el ? el.value.trim() : '';
    }

    function syncPreview() {
        var fields = [
            ['prev-churchName', 'churchName'],
            ['prev-address',    'address'],
            ['prev-phone',      'phone'],
            ['prev-email',      'email'],
            ['prev-subway',     'subwayInfo'],
            ['prev-bus',        'busInfo'],
            ['prev-car',        'carInfo'],
            ['prev-parking',    'parkingInfo'],
        ];
        fields.forEach(function(pair) {
            var el = document.getElementById(pair[0]);
            var v  = val(pair[1]);
            if (el) {
                el.textContent = v || '—';
                el.className = 'preview-value' + (v ? '' : ' empty');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var inputs = document.querySelectorAll('.form-control');
        inputs.forEach(function(inp) {
            inp.addEventListener('input', function() {
                if (document.getElementById('previewPanel').classList.contains('visible')) {
                    syncPreview();
                }
            });
        });
    });
</script>

</main>

</th:block>
</html>
