<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'dashboard')}">

<title th:fragment="title">대시보드</title>

<main th:fragment="main">
<style>
    /* ── Dashboard Styles ── */
    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 28px;
    }
    .stat-card {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        padding: 20px 22px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        position: relative;
        overflow: hidden;
    }
    .stat-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
    }
    .stat-card.blue::before   { background: #185FA5; }
    .stat-card.teal::before   { background: #0F6E56; }
    .stat-card.amber::before  { background: #C9A84C; }
    .stat-card.red::before    { background: #dc3545; }
    .stat-label {
        font-size: 12px;
        color: #7A96B8;
        font-weight: 500;
    }
    .stat-num {
        font-size: 28px;
        font-weight: 600;
        color: #0A1F3D;
        line-height: 1;
    }
    .stat-sub {
        font-size: 11px;
        color: #7A96B8;
        margin-top: 2px;
    }
    .stat-sub.warn { color: #dc3545; font-weight: 500; }

    /* ── Shortcut Cards ── */
    .shortcut-section { margin-bottom: 28px; }
    .section-title {
        font-size: 13px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
    }
    .shortcut-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
    }
    .shortcut-card {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        transition: border-color 0.15s, box-shadow 0.15s;
        cursor: pointer;
        position: relative;
    }
    .shortcut-card:hover {
        border-color: #185FA5;
        box-shadow: 0 2px 8px rgba(13,43,85,0.08);
    }
    .sc-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .sc-icon svg { width: 20px; height: 20px; }
    .sc-icon.blue   { background: #E6F1FB; color: #185FA5; }
    .sc-icon.teal   { background: #E1F5EE; color: #0F6E56; }
    .sc-icon.amber  { background: #FAEEDA; color: #854F0B; }
    .sc-icon.purple { background: #EEEDFE; color: #534AB7; }
    .sc-label { font-size: 13px; font-weight: 500; color: #0A1F3D; }
    .sc-desc  { font-size: 11px; color: #7A96B8; margin-top: 2px; }
    .sc-badge {
        position: absolute;
        top: 12px; right: 12px;
        background: #dc3545;
        color: #fff;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 10px;
        font-weight: 500;
    }

    /* ── Recent Activity ── */
    .recent-section {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
    }
    .recent-header {
        padding: 16px 20px;
        border-bottom: 1px solid #EEF2F8;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .recent-title { font-size: 14px; font-weight: 600; color: #0A1F3D; }
    .recent-link  { font-size: 12px; color: #185FA5; }
    .recent-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        border-bottom: 1px solid #F4F7FC;
        font-size: 13px;
        color: #3A5278;
    }
    .recent-row:last-child { border-bottom: none; }
    .recent-tag {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 4px;
        font-weight: 500;
        flex-shrink: 0;
    }
    .tag-notice  { background: #E6F1FB; color: #185FA5; }
    .tag-family  { background: #EEEDFE; color: #534AB7; }
    .tag-ministry{ background: #E1F5EE; color: #0F6E56; }
    .recent-date { margin-left: auto; font-size: 11px; color: #7A96B8; flex-shrink: 0; }
    .recent-empty {
        padding: 32px 20px;
        text-align: center;
        color: #7A96B8;
        font-size: 13px;
    }
</style>

<!-- 통계 카드 -->
<div class="stat-grid">
    <div class="stat-card blue">
        <div class="stat-label">공지사항</div>
        <div class="stat-num" th:text="${noticeCount ?: 0}">0</div>
        <div class="stat-sub">전체 등록 건수</div>
    </div>
    <div class="stat-card teal">
        <div class="stat-label">사역 사진</div>
        <div class="stat-num" th:text="${ministryCount ?: 0}">0</div>
        <div class="stat-sub">전체 등록 건수</div>
    </div>
    <div class="stat-card red">
        <div class="stat-label">새가족 미확인</div>
        <div class="stat-num" th:text="${uncheckedCount ?: 0}">0</div>
        <div class="stat-sub" th:classappend="${uncheckedCount > 0} ? 'warn'" th:text="${uncheckedCount > 0} ? '확인이 필요합니다' : '모두 확인됨'">-</div>
    </div>
    <div class="stat-card amber">
        <div class="stat-label">새가족 전체</div>
        <div class="stat-num" th:text="${newFamilyTotal ?: 0}">0</div>
        <div class="stat-sub"><a href="/admin/new-family" style="color:#7A96B8; text-decoration:none;">목록 보기 →</a></div>
    </div>
</div>

<!-- 바로가기 -->
<div class="shortcut-section">
    <div class="section-title">바로가기</div>
    <div class="shortcut-grid">

        <a href="/admin/notices" class="shortcut-card">
            <div class="sc-icon blue">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 13V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10l3-2h10z"/>
                    <line x1="5" y1="7" x2="13" y2="7"/>
                    <line x1="5" y1="10" x2="10" y2="10"/>
                </svg>
            </div>
            <div>
                <div class="sc-label">공지사항</div>
                <div class="sc-desc">등록 · 수정 · 삭제</div>
            </div>
        </a>

        <a href="/admin/ministry" class="shortcut-card">
            <div class="sc-icon teal">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="4" width="16" height="12" rx="1"/>
                    <circle cx="7" cy="8" r="2"/>
                    <path d="M2 14l4-4 3 3 3-3 5 5"/>
                </svg>
            </div>
            <div>
                <div class="sc-label">사역소개 관리</div>
                <div class="sc-desc">사역 사진 등록 · 관리</div>
            </div>
        </a>

        <a href="/admin/new-family" class="shortcut-card">
            <div class="sc-icon purple">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="6" r="3"/>
                    <path d="M2 18c0-4 2.7-6 6-6s6 2 6 6"/>
                    <circle cx="15" cy="7" r="2.5"/>
                    <path d="M19 18c0-3-1.5-5-4-5"/>
                </svg>
            </div>
            <div>
                <div class="sc-label">새가족 관리</div>
                <div class="sc-desc">등록 목록 · 처리</div>
            </div>
            <span class="sc-badge"
                  th:if="${uncheckedCount != null and uncheckedCount > 0}"
                  th:text="${uncheckedCount}"></span>
        </a>

    </div>
</div>

<!-- 최근 공지사항 -->
<div class="recent-section">
    <div class="recent-header">
        <div class="recent-title">최근 공지사항</div>
        <a href="/admin/notices" class="recent-link">전체 보기 →</a>
    </div>
    <div th:if="${recentNotices != null and not #lists.isEmpty(recentNotices)}">
        <div class="recent-row" th:each="n : ${recentNotices}">
            <span class="recent-tag tag-notice">공지</span>
            <a th:href="@{/admin/notices/edit/{id}(id=${n.id})}"
               style="color:#3A5278; text-decoration:none; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
               th:text="${n.title}"></a>
            <span class="recent-date" th:text="${#temporals.format(n.createdAt, 'MM.dd')}">04.07</span>
        </div>
    </div>
    <div th:if="${recentNotices == null or #lists.isEmpty(recentNotices)}" class="recent-empty">
        등록된 공지사항이 없습니다.
    </div>
</div>

<!-- 새가족 미확인 목록 -->
<div class="recent-section" style="margin-top: 20px;">
    <div class="recent-header">
        <div class="recent-title">
            새가족 미확인
            <span style="display:inline-block; margin-left:8px; background:#dc3545; color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500;"
                  th:if="${uncheckedCount > 0}" th:text="${uncheckedCount} + '건'"></span>
            <span style="display:inline-block; margin-left:8px; background:#DDE4EF; color:#7A96B8; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500;"
                  th:if="${uncheckedCount == 0}">모두 확인됨</span>
        </div>
        <a href="/admin/new-family?status=unchecked" class="recent-link">전체 보기 →</a>
    </div>
    <div th:if="${recentNewFamilies != null and not #lists.isEmpty(recentNewFamilies)}">
        <div class="recent-row" th:each="nf : ${recentNewFamilies}">
            <span class="recent-tag tag-family">새가족</span>
            <a th:href="@{/admin/new-family/{id}(id=${nf.id})}"
               style="color:#3A5278; text-decoration:none; flex:1;"
               th:text="${nf.name} + ' (' + ${nf.phone} + ')'"></a>
            <span class="recent-date" th:text="${#temporals.format(nf.createdAt, 'MM.dd')}"></span>
        </div>
    </div>
    <div th:if="${recentNewFamilies == null or #lists.isEmpty(recentNewFamilies)}" class="recent-empty">
        미확인 새가족이 없습니다. 🎉
    </div>
</div>

</main>

</th:block>
</html>
