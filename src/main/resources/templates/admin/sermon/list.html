<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'sermon')}">

<title th:fragment="title">설교 관리</title>

<main th:fragment="main">
<style>
    .page-toolbar {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
    }
    .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
    .alert-error   { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }
    .btn-primary {
        display: inline-flex; align-items: center; gap: 6px;
        background: #0D2B55; color: #fff; border: none; border-radius: 6px;
        padding: 9px 18px; font-size: 13px; font-weight: 500; cursor: pointer;
        text-decoration: none; transition: background 0.15s;
    }
    .btn-primary:hover { background: #185FA5; }
    .btn-sm {
        display: inline-flex; align-items: center; font-size: 12px;
        padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer;
        text-decoration: none; font-weight: 500; transition: opacity 0.15s;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-edit   { background: #E6F1FB; color: #185FA5; }
    .btn-delete { background: #FCEBEB; color: #A32D2D; }

    .data-table {
        width: 100%; background: #fff; border: 1px solid #DDE4EF;
        border-radius: 10px; overflow: hidden;
    }
    .data-table table { width: 100%; border-collapse: collapse; }
    .data-table th {
        background: #F8FAFD; font-size: 12px; font-weight: 600; color: #7A96B8;
        text-transform: uppercase; letter-spacing: 0.05em;
        padding: 12px 16px; text-align: left; border-bottom: 1px solid #DDE4EF;
    }
    .data-table td {
        padding: 12px 16px; font-size: 13px; color: #3A5278;
        border-bottom: 1px solid #F4F7FC; vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #FAFBFD; }
    .title-cell { color: #0A1F3D; font-weight: 500; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .action-cell { display: flex; gap: 6px; }
    .empty-row td { text-align: center; color: #7A96B8; padding: 40px !important; }

    .sermon-thumb-cell { width: 80px; }
    .sermon-thumb-cell img {
        width: 72px; height: 42px; object-fit: cover;
        border-radius: 4px; display: block;
    }
    .sermon-thumb-empty {
        width: 72px; height: 42px; border-radius: 4px;
        background: linear-gradient(135deg,#0D2B55,#185FA5);
        display: flex; align-items: center; justify-content: center;
    }
    .sermon-thumb-empty::after {
        content: '▶';
        font-size: 12px;
        color: rgba(201,168,76,0.9);
    }
    .bible-tag {
        display: inline-block; padding: 2px 8px;
        background: #E6F1FB; color: #185FA5;
        font-size: 11px; border-radius: 12px;
        border: 1px solid rgba(24,95,165,0.2);
    }
</style>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

<div class="page-toolbar">
    <div style="font-size:13px; color:#7A96B8;">
        총 <strong style="color:#0A1F3D;" th:text="${#lists.size(sermons)}">0</strong>편
    </div>
    <a href="/admin/sermon/new" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
        설교 동영상 등록
    </a>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th class="sermon-thumb-cell">썸네일</th>
                <th>제목</th>
                <th>설교자</th>
                <th>성경 본문</th>
                <th>설교일</th>
                <th>등록일</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(sermons)}" class="empty-row">
                <td colspan="7">등록된 설교 동영상이 없습니다.</td>
            </tr>
            <tr th:each="sermon : ${sermons}">
                <td class="sermon-thumb-cell">
                    <img th:if="${sermon.thumbnailUrl != null}" th:src="${sermon.thumbnailUrl}" alt="">
                    <div class="sermon-thumb-empty" th:if="${sermon.thumbnailUrl == null}"></div>
                </td>
                <td class="title-cell" th:text="${sermon.title}">제목</td>
                <td th:text="${sermon.preacher}">설교자</td>
                <td><span class="bible-tag" th:text="${sermon.biblePassage}">성경본문</span></td>
                <td th:text="${#temporals.format(sermon.sermonDate, 'yyyy.MM.dd')}">날짜</td>
                <td th:text="${#temporals.format(sermon.createdAt, 'yyyy.MM.dd')}">등록일</td>
                <td>
                    <div class="action-cell">
                        <a th:href="@{/admin/sermon/edit/{id}(id=${sermon.id})}" class="btn-sm btn-edit">수정</a>
                        <form th:action="@{/admin/sermon/delete/{id}(id=${sermon.id})}" method="post"
                              onsubmit="return confirm('이 설교를 삭제하시겠습니까? 동영상 파일도 함께 삭제됩니다.')">
                            <button type="submit" class="btn-sm btn-delete">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</main>
</th:block>
</html>
