<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'sermon')}">

<title th:fragment="title" th:text="${sermon.id == null} ? '설교 등록' : '설교 수정'">설교 등록</title>

<main th:fragment="main">
<style>
    .form-card {
        background: #fff; border: 1px solid #DDE4EF; border-radius: 10px;
        padding: 28px 32px; max-width: 720px;
    }
    .form-row { margin-bottom: 20px; }
    .form-label {
        display: block; font-size: 12px; font-weight: 600; color: #7A96B8;
        letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px;
    }
    .form-required { color: #A32D2D; margin-left: 2px; }
    .form-input, .form-textarea {
        width: 100%; padding: 9px 14px; border: 1px solid #DDE4EF; border-radius: 6px;
        font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: #0A1F3D;
        outline: none; transition: border-color 0.2s; background: #fff;
    }
    .form-input:focus, .form-textarea:focus { border-color: #185FA5; }
    .form-textarea { min-height: 120px; resize: vertical; }

    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .form-hint { font-size: 12px; color: #7A96B8; margin-top: 5px; }

    .form-actions {
        display: flex; gap: 10px; align-items: center;
        padding-top: 20px; border-top: 1px solid #F4F7FC; margin-top: 24px;
    }
    .btn-submit {
        padding: 10px 28px; background: #0D2B55; color: #fff; border: none;
        border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;
        font-family: 'Noto Sans KR', sans-serif; transition: background 0.2s;
    }
    .btn-submit:hover { background: #185FA5; }
    .btn-cancel {
        padding: 10px 20px; color: #7A96B8; border: 1px solid #DDE4EF;
        border-radius: 6px; font-size: 14px; font-weight: 400; cursor: pointer;
        font-family: 'Noto Sans KR', sans-serif; text-decoration: none;
        background: #fff; transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: #7A96B8; }

    .alert-error { padding: 12px 16px; border-radius: 6px; font-size: 13px;
        margin-bottom: 16px; background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }

    .yt-preview {
        margin-top: 12px; display: none;
    }
    .yt-preview img {
        width: 160px; height: 90px; object-fit: cover; border-radius: 6px;
        border: 1px solid #DDE4EF;
    }
</style>

<div th:if="${error}" class="alert-error" th:text="${error}"></div>

<div class="form-card">
    <form th:action="@{/admin/sermon/save}" method="post" id="sermonForm">
        <input type="hidden" name="id" th:value="${sermon.id}">

        <!-- 제목 -->
        <div class="form-row">
            <label class="form-label">제목 <span class="form-required">*</span></label>
            <input type="text" name="title" class="form-input"
                   th:value="${sermon.title}" placeholder="설교 제목을 입력하세요" required>
        </div>

        <!-- 설교자 / 날짜 -->
        <div class="form-grid-2">
            <div class="form-row">
                <label class="form-label">설교자 <span class="form-required">*</span></label>
                <input type="text" name="preacher" class="form-input"
                       th:value="${sermon.preacher}" placeholder="홍길동 목사" required>
            </div>
            <div class="form-row">
                <label class="form-label">설교일 <span class="form-required">*</span></label>
                <input type="date" name="sermonDateStr" class="form-input"
                       th:value="${sermon.sermonDate}" required>
            </div>
        </div>

        <!-- 성경 본문 -->
        <div class="form-row">
            <label class="form-label">성경 본문 <span class="form-required">*</span></label>
            <input type="text" name="biblePassage" class="form-input"
                   th:value="${sermon.biblePassage}"
                   placeholder="요한복음 3:16"
                   list="bibleBooks" autocomplete="off" required>
            <datalist id="bibleBooks">
                <option value="창세기"><option value="출애굽기"><option value="레위기"><option value="민수기"><option value="신명기">
                <option value="여호수아"><option value="사사기"><option value="룻기"><option value="사무엘상"><option value="사무엘하">
                <option value="열왕기상"><option value="열왕기하"><option value="역대상"><option value="역대하"><option value="에스라">
                <option value="느헤미야"><option value="에스더"><option value="욥기"><option value="시편"><option value="잠언">
                <option value="전도서"><option value="아가"><option value="이사야"><option value="예레미야"><option value="예레미야애가">
                <option value="에스겔"><option value="다니엘"><option value="호세아"><option value="요엘"><option value="아모스">
                <option value="오바댜"><option value="요나"><option value="미가"><option value="나훔"><option value="하박국">
                <option value="스바냐"><option value="학개"><option value="스가랴"><option value="말라기">
                <option value="마태복음"><option value="마가복음"><option value="누가복음"><option value="요한복음"><option value="사도행전">
                <option value="로마서"><option value="고린도전서"><option value="고린도후서"><option value="갈라디아서"><option value="에베소서">
                <option value="빌립보서"><option value="골로새서"><option value="데살로니가전서"><option value="데살로니가후서"><option value="디모데전서">
                <option value="디모데후서"><option value="디도서"><option value="빌레몬서"><option value="히브리서"><option value="야고보서">
                <option value="베드로전서"><option value="베드로후서"><option value="요한일서"><option value="요한이서"><option value="요한삼서">
                <option value="유다서"><option value="요한계시록">
            </datalist>
            <p class="form-hint">책 이름 입력 후 장·절 추가 입력 (예: 요한복음 3:16)</p>
        </div>

        <!-- 설명 -->
        <div class="form-row">
            <label class="form-label">설교 요약 / 설명</label>
            <textarea name="description" class="form-textarea"
                      placeholder="설교 내용을 간략히 소개해주세요 (선택)." th:text="${sermon.description}"></textarea>
        </div>

        <!-- YouTube URL -->
        <div class="form-row">
            <label class="form-label">YouTube URL <span class="form-required">*</span></label>
            <input type="url" name="videoUrl" id="videoUrl" class="form-input"
                   th:value="${sermon.videoUrl}"
                   placeholder="https://www.youtube.com/watch?v=..."
                   oninput="previewYoutube(this.value)"
                   th:required="${sermon.id == null}">
            <p class="form-hint">YouTube 영상 주소창 URL 또는 공유 링크를 붙여넣으세요.</p>
            <p class="form-hint" th:if="${sermon.id != null}">비워두면 기존 URL이 유지됩니다.</p>
            <div id="youtubePreview" class="yt-preview">
                <img id="ytThumb" src="" alt="YouTube 썸네일 미리보기">
            </div>
        </div>

        <!-- 썸네일 URL (선택) -->
        <div class="form-row">
            <label class="form-label">썸네일 이미지 URL (선택)</label>
            <input type="url" name="thumbnailUrl" class="form-input"
                   th:value="${sermon.thumbnailUrl}"
                   placeholder="비워두면 YouTube 썸네일이 자동으로 사용됩니다">
            <p class="form-hint">다른 이미지를 사용하려면 URL을 직접 입력하세요.</p>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit"
                    th:text="${sermon.id == null} ? '등록하기' : '저장하기'">등록하기</button>
            <a href="/admin/sermon" class="btn-cancel">취소</a>
        </div>
    </form>
</div>

<script>
function previewYoutube(url) {
    const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    const preview = document.getElementById('youtubePreview');
    const thumb = document.getElementById('ytThumb');
    if (match) {
        thumb.src = 'https://img.youtube.com/vi/' + match[1] + '/hqdefault.jpg';
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }
}
document.addEventListener('DOMContentLoaded', function() {
    const urlInput = document.getElementById('videoUrl');
    if (urlInput && urlInput.value) previewYoutube(urlInput.value);
});
</script>
</main>
</th:block>
</html>
