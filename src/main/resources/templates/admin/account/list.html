<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'account')}">

<title th:fragment="title">계정 관리</title>

<main th:fragment="main">
<style>
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }

    .panel {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
    }
    .panel-header {
        padding: 16px 22px;
        border-bottom: 1px solid #EEF2F8;
        font-size: 14px;
        font-weight: 600;
        color: #0A1F3D;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .panel-header svg { flex-shrink: 0; }
    .panel-body { padding: 22px; }

    /* 폼 */
    .form-group { margin-bottom: 16px; }
    .form-group:last-of-type { margin-bottom: 20px; }
    .form-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
    }
    .form-control {
        width: 100%;
        padding: 9px 13px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        font-size: 13px;
        color: #0A1F3D;
        background: #FAFBFD;
        box-sizing: border-box;
        font-family: 'Noto Sans KR', sans-serif;
        transition: border-color 0.15s;
    }
    .form-control:focus { outline: none; border-color: #185FA5; background: #fff; }
    .form-hint { font-size: 11px; color: #7A96B8; margin-top: 4px; }

    .btn-save {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #0D2B55;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
    }
    .btn-save:hover { background: #185FA5; }

    /* 계정 목록 */
    .account-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .account-table th {
        text-align: left;
        padding: 10px 14px;
        border-bottom: 2px solid #EEF2F8;
        font-size: 11px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    .account-table td {
        padding: 12px 14px;
        border-bottom: 1px solid #F4F7FC;
        color: #3A5278;
        vertical-align: middle;
    }
    .account-table tr:last-child td { border-bottom: none; }
    .account-table tr:hover td { background: #F8FAFD; }

    .badge-role {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 10px;
        background: #E6F1FB;
        color: #185FA5;
    }
    .badge-active   { background: #EAF3DE; color: #3B6D11; font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; }
    .badge-inactive { background: #FCEBEB; color: #A32D2D; font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; }
    .badge-me { background: #FFF4D6; color: #7A4F00; font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; }

    .action-btns { display: flex; gap: 6px; }
    .btn-xs {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-weight: 500;
        transition: opacity 0.15s;
        text-decoration: none;
        display: inline-block;
    }
    .btn-xs:hover { opacity: 0.8; }
    .btn-toggle-on  { background: #EAF3DE; color: #3B6D11; }
    .btn-toggle-off { background: #FFF4D6; color: #7A4F00; }
    .btn-danger     { background: #FCEBEB; color: #A32D2D; }

    .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; }
    .alert-success { background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; }
    .alert-danger  { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }

    .current-user-label {
        font-size: 12px;
        color: #7A96B8;
        margin-bottom: 16px;
    }
    .current-user-label strong { color: #0A1F3D; }
</style>

<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

<div class="two-col">

    <!-- 왼쪽: 비밀번호 변경 + 계정 추가 -->
    <div style="display:flex; flex-direction:column; gap:20px;">

        <!-- 비밀번호 변경 -->
        <div class="panel">
            <div class="panel-header">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#185FA5" stroke-width="1.5">
                    <rect x="3" y="6" width="9" height="8" rx="1"/>
                    <path d="M5 6V4.5a2.5 2.5 0 1 1 5 0V6"/>
                    <circle cx="7.5" cy="10" r="1"/>
                </svg>
                비밀번호 변경
            </div>
            <div class="panel-body">
                <p class="current-user-label">현재 계정: <strong th:text="${currentUsername}">admin</strong></p>
                <form th:action="@{/admin/account/change-password}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="currentPassword">현재 비밀번호</label>
                        <input type="password" id="currentPassword" name="currentPassword"
                               class="form-control" required placeholder="현재 비밀번호 입력">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="newPassword">새 비밀번호</label>
                        <input type="password" id="newPassword" name="newPassword"
                               class="form-control" required placeholder="8자 이상"
                               minlength="8" oninput="checkMatch()">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">새 비밀번호 확인</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               class="form-control" required placeholder="새 비밀번호 재입력"
                               oninput="checkMatch()">
                        <div class="form-hint" id="matchHint"></div>
                    </div>
                    <button type="submit" class="btn-save" id="pwSubmitBtn">비밀번호 변경</button>
                </form>
            </div>
        </div>

        <!-- 계정 추가 -->
        <div class="panel">
            <div class="panel-header">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#185FA5" stroke-width="1.5">
                    <circle cx="6" cy="5" r="3"/>
                    <path d="M1 13c0-3 2.3-5 5-5s5 2 5 5"/>
                    <line x1="12" y1="6" x2="12" y2="12"/>
                    <line x1="9" y1="9" x2="15" y2="9"/>
                </svg>
                계정 추가
            </div>
            <div class="panel-body">
                <form th:action="@{/admin/account/create}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="newUsername">사용자명</label>
                        <input type="text" id="newUsername" name="username"
                               class="form-control" required placeholder="영문, 숫자 조합"
                               pattern="[a-zA-Z0-9_]+" maxlength="50">
                        <div class="form-hint">영문, 숫자, 언더바(_)만 사용 가능</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="newPw">비밀번호</label>
                        <input type="password" id="newPw" name="password"
                               class="form-control" required placeholder="8자 이상"
                               minlength="8">
                    </div>
                    <button type="submit" class="btn-save"
                            style="background:#0F6E56;"
                            onclick="return confirm('새 관리자 계정을 추가하시겠습니까?')">계정 추가</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 오른쪽: 계정 목록 -->
    <div class="panel">
        <div class="panel-header">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#185FA5" stroke-width="1.5">
                <circle cx="5" cy="4" r="2.5"/>
                <path d="M1 12c0-2.5 1.8-4 4-4s4 1.5 4 4"/>
                <circle cx="11" cy="5" r="2"/>
                <path d="M14 12c0-2-1.3-3-3-3"/>
            </svg>
            전체 계정 (<span th:text="${#lists.size(users)}">0</span>)
        </div>
        <div style="overflow-x:auto;">
            <table class="account-table">
                <thead>
                    <tr>
                        <th>사용자명</th>
                        <th>권한</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td>
                            <strong th:text="${user.username}">username</strong>
                            <span class="badge-me" th:if="${user.username == currentUsername}" style="margin-left:6px;">나</span>
                        </td>
                        <td><span class="badge-role" th:text="${user.role}">ROLE_ADMIN</span></td>
                        <td>
                            <span th:if="${user.enabled}"  class="badge-active">활성</span>
                            <span th:if="${!user.enabled}" class="badge-inactive">비활성</span>
                        </td>
                        <td>
                            <div class="action-btns" th:if="${user.username != currentUsername}">
                                <!-- 활성/비활성 토글 -->
                                <form th:action="@{/admin/account/toggle/{id}(id=${user.id})}" method="post" style="display:inline;">
                                    <button type="submit"
                                            th:class="${user.enabled} ? 'btn-xs btn-toggle-off' : 'btn-xs btn-toggle-on'"
                                            th:text="${user.enabled} ? '비활성화' : '활성화'"
                                            th:onclick="${user.enabled} ? 'return confirm(\'이 계정을 비활성화하시겠습니까?\')' : 'return confirm(\'이 계정을 활성화하시겠습니까?\')'">
                                    </button>
                                </form>
                                <!-- 삭제 -->
                                <form th:action="@{/admin/account/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn-xs btn-danger"
                                            onclick="return confirm('이 계정을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">삭제</button>
                                </form>
                            </div>
                            <span th:if="${user.username == currentUsername}"
                                  style="font-size:11px; color:#B5D4F4;">현재 계정</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    function checkMatch() {
        const np = document.getElementById('newPassword').value;
        const cp = document.getElementById('confirmPassword').value;
        const hint = document.getElementById('matchHint');
        const btn  = document.getElementById('pwSubmitBtn');
        if (!cp) { hint.textContent = ''; return; }
        if (np === cp) {
            hint.textContent = '✓ 비밀번호가 일치합니다.';
            hint.style.color = '#3B6D11';
            btn.disabled = false;
        } else {
            hint.textContent = '✗ 비밀번호가 일치하지 않습니다.';
            hint.style.color = '#A32D2D';
            btn.disabled = true;
        }
    }
</script>

</main>

</th:block>
</html>
