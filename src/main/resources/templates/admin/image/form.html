<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:replace="~{admin/fragments/layout :: adminLayout(~{::title}, ~{::main}, 'image')}">

<title th:fragment="title" th:text="${image.id == null ? '이미지 등록' : '이미지 수정'}">이미지 등록</title>

<main th:fragment="main">
<style>
    .form-card {
        background: #fff;
        border: 1px solid #DDE4EF;
        border-radius: 10px;
        overflow: hidden;
        max-width: 760px;
    }
    .form-card-header {
        padding: 16px 22px;
        border-bottom: 1px solid #EEF2F8;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .form-card-title { font-size: 14px; font-weight: 600; color: #0A1F3D; }
    .form-card-body  { padding: 24px 22px; }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    .form-group { margin-bottom: 22px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #7A96B8;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
    }
    .form-control {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        font-size: 14px;
        color: #0A1F3D;
        font-family: 'Noto Sans KR', sans-serif;
        background: #FAFBFD;
        transition: border-color 0.15s;
        box-sizing: border-box;
    }
    .form-control:focus {
        outline: none;
        border-color: #185FA5;
        background: #fff;
    }
    textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.7; }
    .form-hint { font-size: 11px; color: #7A96B8; margin-top: 5px; }

    /* 미리보기 */
    .preview-wrap {
        margin-top: 10px;
        border: 1.5px dashed #DDE4EF;
        border-radius: 8px;
        min-height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F8FAFD;
        overflow: hidden;
    }
    .preview-wrap img {
        max-width: 100%;
        max-height: 260px;
        object-fit: contain;
        display: block;
    }
    .preview-placeholder {
        color: #B5D4F4;
        font-size: 13px;
        text-align: center;
        padding: 30px;
    }

    /* 토글 */
    .toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        background: #FAFBFD;
    }
    .toggle-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #185FA5; }
    .toggle-label { font-size: 13px; color: #3A5278; cursor: pointer; }

    /* 버튼 */
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 22px;
        border-top: 1px solid #EEF2F8;
        background: #F8FAFD;
    }
    .btn-cancel {
        padding: 9px 18px;
        border: 1px solid #DDE4EF;
        border-radius: 6px;
        background: #fff;
        color: #3A5278;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: #7A96B8; }
    .btn-save {
        padding: 9px 22px;
        border: none;
        border-radius: 6px;
        background: #0D2B55;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 0.15s;
    }
    .btn-save:hover { background: #185FA5; }
</style>

<div class="form-card">
    <div class="form-card-header">
        <div class="form-card-title" th:text="${image.id == null ? '이미지 등록' : '이미지 수정'}">이미지 등록</div>
        <a href="/admin/images" style="font-size:12px; color:#7A96B8;">← 목록으로</a>
    </div>

    <form th:action="@{/admin/images/save}" method="post">
        <input type="hidden" th:field="${image.id}" />

        <div class="form-card-body">

            <!-- 제목 + 순서 한 줄 -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="title">제목 <span style="color:#dc3545;">*</span></label>
                    <input type="text" id="title" class="form-control"
                           th:field="${image.title}" required
                           placeholder="이미지 제목을 입력하세요" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="displayOrder">표시 순서 <span style="color:#dc3545;">*</span></label>
                    <input type="number" id="displayOrder" class="form-control"
                           th:field="${image.displayOrder}" required
                           placeholder="0" min="0" />
                    <div class="form-hint">숫자가 작을수록 먼저 표시됩니다.</div>
                </div>
            </div>

            <!-- 설명 -->
            <div class="form-group">
                <label class="form-label" for="description">설명</label>
                <textarea id="description" class="form-control"
                          th:field="${image.description}"
                          placeholder="이미지 설명을 입력하세요 (선택사항)"></textarea>
            </div>

            <!-- 이미지 URL -->
            <div class="form-group">
                <label class="form-label" for="imageUrl">이미지 URL <span style="color:#dc3545;">*</span></label>
                <input type="text" id="imageUrl" class="form-control"
                       th:field="${image.imageUrl}" required
                       placeholder="/images/main-slide1.jpg 또는 https://example.com/image.jpg"
                       oninput="updatePreview(this.value)" />
                <div class="form-hint">예: /images/main-slide1.jpg 또는 https://example.com/image.jpg</div>
                <div class="preview-wrap">
                    <img id="previewImg"
                         th:src="${image.imageUrl}"
                         th:style="${image.imageUrl != null and !image.imageUrl.isEmpty()} ? '' : 'display:none'"
                         alt="미리보기"
                         onerror="this.style.display='none'; document.getElementById('previewPlaceholder').style.display='';">
                    <div class="preview-placeholder" id="previewPlaceholder"
                         th:style="${image.imageUrl != null and !image.imageUrl.isEmpty()} ? 'display:none' : ''">
                        URL 입력 시 미리보기가 표시됩니다
                    </div>
                </div>
            </div>

            <!-- 활성화 -->
            <div class="form-group">
                <label class="form-label">공개 여부</label>
                <div class="toggle-row">
                    <input type="checkbox" id="isActive" class="form-control"
                           th:field="${image.isActive}" style="width:16px; padding:0;">
                    <label class="toggle-label" for="isActive">메인 페이지에 표시 (활성화)</label>
                </div>
            </div>

        </div>

        <div class="form-actions">
            <a href="/admin/images" class="btn-cancel">취소</a>
            <button type="submit" class="btn-save">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 7l3.5 3.5L11 3"/>
                </svg>
                저장
            </button>
        </div>
    </form>
</div>

<script>
    function updatePreview(url) {
        const img = document.getElementById('previewImg');
        const placeholder = document.getElementById('previewPlaceholder');
        if (url && url.trim()) {
            img.src = url;
            img.style.display = 'block';
            placeholder.style.display = 'none';
            img.onerror = function() {
                img.style.display = 'none';
                placeholder.style.display = '';
                placeholder.textContent = '이미지를 불러올 수 없습니다.';
            };
        } else {
            img.style.display = 'none';
            placeholder.style.display = '';
            placeholder.textContent = 'URL 입력 시 미리보기가 표시됩니다';
        }
    }
</script>
</main>

</th:block>
</html>
