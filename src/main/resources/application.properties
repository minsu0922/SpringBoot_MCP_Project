spring.application.name=church-website
server.port=8080

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Database — 실제 값은 application-local.properties(로컬) 또는 환경변수(운영)로 주입
spring.datasource.url=jdbc:mysql://localhost:3306/church_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
file.upload.dir=${user.dir}/src/main/resources/static/uploads/ministry

# Kakao Map API — 실제 값은 application-local.properties(로컬) 또는 환경변수(운영)로 주입
kakao.map.api.key=${KAKAO_MAP_API_KEY}

# Session
server.servlet.session.timeout=30m

# Logging (개발 기본값 — 운영은 application-prod.properties 참고)
logging.level.root=INFO
logging.level.com.church.website=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
