spring.application.name=church-website
server.port=8080

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/church_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:church_user}
spring.datasource.password=${DB_PASSWORD:hm092274}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=512MB
file.upload.dir=${user.dir}/src/main/resources/static/uploads/ministry
file.upload.sermon.dir=${user.dir}/src/main/resources/static/uploads/sermon

# Kakao Map API
kakao.map.api.key=${KAKAO_MAP_API_KEY:11fd803d5d2ec36670b9fc590cb22442}

# Logging (dev 기본값 — prod 환경은 application-prod.properties 참고)
logging.level.root=INFO
logging.level.com.church.website=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
